# Server
server.port=8080

# Database - PostgreSQL
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/virtualworld}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:password}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

# JWT
app.jwt.secret=${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
app.jwt.expiration=${JWT_EXPIRATION:86400000}
app.jwt.refresh-expiration=${JWT_REFRESH_EXPIRATION:604800000}

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://192.168.0.107:3000}

# Logging
logging.level.com.virtualworld=DEBUG
logging.level.org.springframework.security=INFO
